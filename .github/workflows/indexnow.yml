name: IndexNow ping

# After every push to main, wait for the GitHub Pages deploy to land
# (poll the IndexNow key file), then submit the current sitemap URLs
# to IndexNow. Bing, Yandex, Naver, Seznam, Yep, and DuckDuckGo (via
# Bing) all consume this. Google does not.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for GitHub Pages deploy to be live
        run: |
          KEY=d32ac8707e794a0b88daed8b3e476564
          KEY_URL="https://labs.hexaxia.tech/${KEY}.txt"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$KEY_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Key file live after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting 10s"
            sleep 10
          done
          echo "Timeout waiting for key file at $KEY_URL"
          exit 1

      - name: Fetch sitemap and submit to IndexNow
        run: |
          KEY=d32ac8707e794a0b88daed8b3e476564
          KEY_URL="https://labs.hexaxia.tech/${KEY}.txt"
          # Astro sitemap is an index that points at sitemap-0.xml.
          # Pull the inner sitemap URL out of the index, then pull URLs
          # from that inner sitemap.
          INNER=$(curl -s https://labs.hexaxia.tech/sitemap-index.xml | grep -oE 'https://labs\.hexaxia\.tech/sitemap[^<]*\.xml' | head -1)
          if [ -z "$INNER" ]; then
            echo "Could not find inner sitemap URL"
            exit 1
          fi
          echo "Inner sitemap: $INNER"
          URLS=$(curl -s "$INNER" | grep -oE 'https://labs\.hexaxia\.tech[^<]*' | grep -v '\.xml$' | sort -u)
          if [ -z "$URLS" ]; then
            echo "No URLs found in inner sitemap; aborting"
            exit 1
          fi
          echo "URLs to submit:"
          echo "$URLS"
          URL_JSON=$(echo "$URLS" | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "labs.hexaxia.tech" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_URL" \
            --argjson urlList "$URL_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
          echo "Payload:"
          echo "$PAYLOAD"
          STATUS=$(curl -s -o /tmp/indexnow-response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          echo "Response status: $STATUS"
          cat /tmp/indexnow-response.txt
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ]; then
            echo "IndexNow submission accepted"
            exit 0
          else
            echo "IndexNow submission failed"
            exit 1
          fi
